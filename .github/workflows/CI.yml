name: CI - Continuous Integration
on:
  push: 
    branches: [develop-CLEVER-relations, main]
  pull_request: 
    branches: [develop-CLEVER-relations, main]
  workflow_dispatch:

# Prevent multiple runs of the same branch overlapping
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DEBUG_MODE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') && 'false' || 'true' }}

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Resolve & install
        run: |
         uv sync --extra cpu --extra dev 

      - name: Verify torch installation
        run: |
          .venv/bin/python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          .venv/bin/pip show torch | grep -E "Name|Version|Location"

      - name: Install spaCy model
        run: |
            .venv/bin/python -m spacy download en_core_web_sm
            .venv/bin/python -m spacy download en_core_web_lg
            .venv/bin/python -m spacy validate || true

      - name: set USE_SUBPROCESS true
        run: |
          echo "USE_SUBPROCESS=true" >> $GITHUB_ENV

      # --- Quality gate: formatting & types (only in debug mode) ---
      - name: Check formatting (black)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true
        run: uv run --no-sync black --check .

      - name: Check imports (isort)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true
        run: uv run --no-sync isort --profile black --check-only .

      - name: Type check (mypy)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true 
        run: |
          set +e
          uv run --no-sync mypy --install-types --non-interactive .

      # --- Run CPU tests ---
      - name: Run CPU tests
        run: |
          TEST_LIST=(
            'InferenceAPI'
            'dummy_datanode'
            'examples/conll04'
            'examples/edges'
            'examples/graph_city'
            'examples/graph_coloring'
            'examples/logical_all'
            'examples/mnist-arithmetic'
            'examples/nested_relations'
            'examples/orbs'
            'examples/test_switch_constraints'
            'examples/equality'
            'graph_errors'
            'sensor/pytorch'
            'simple_regression'
            'solver'
            'namedTree'
            'examples/iota'
            'examples/same_different'
            'vizual'
          )
          
          bash .github/scripts/run_tests.sh "test-cpu" "${TEST_LIST[@]}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-cpu
          path: |
            /tmp/test_results_test-cpu.txt
            /tmp/test_failures_test-cpu.txt
          retention-days: 1

  test-gpu:
    runs-on: [self-hosted, linux, x64, gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Resolve & install
        run: |
         uv sync --extra cu128 --extra dev --extra vllm --extra peft

      - name: Install spaCy model
        run: |
            .venv/bin/python -m spacy download en_core_web_sm
            .venv/bin/python -m spacy download en_core_web_lg
            .venv/bin/python -m spacy validate || true

      - name: set USE_SUBPROCESS true
        run: |
          echo "USE_SUBPROCESS=true" >> $GITHUB_ENV

      - name: Download CLEVR dataset images
        run: |
          TRAIN_IMAGES="test_regr/Clever/train/images"
          if [ -d "$TRAIN_IMAGES" ] && [ "$(ls -A $TRAIN_IMAGES)" ]; then
            echo "CLEVR training images already cached at $TRAIN_IMAGES"
            echo "Image count: $(ls $TRAIN_IMAGES | wc -l)"
          else
            echo "Downloading CLEVR_v1.0.zip ..."
            mkdir -p "$TRAIN_IMAGES"
            curl -L --retry 3 --retry-delay 5 \
              -o /tmp/CLEVR_v1.0.zip \
              "https://dl.fbaipublicfiles.com/clevr/CLEVR_v1.0.zip"
            echo "Extracting training images ..."
            .venv/bin/python - <<'PYEOF'
          import zipfile, os, shutil

          zip_path  = "/tmp/CLEVR_v1.0.zip"
          dest_dir  = "test_regr/Clever/train/images"
          prefix    = "CLEVR_v1.0/images/train/"
          # Tests use indices up to dataset length (7856); extract 10k to cover all
          # possible --train-start / --test-start combinations with a small buffer.
          MAX_IMAGES = 10_000

          os.makedirs(dest_dir, exist_ok=True)
          with zipfile.ZipFile(zip_path) as zf:
              entries = sorted(
                  e for e in zf.namelist()
                  if e.startswith(prefix) and not e.endswith("/")
              )[:MAX_IMAGES]
              print(f"Extracting {len(entries)} of ~70k training images (test fraction)")
              for i, entry in enumerate(entries):
                  target = os.path.join(dest_dir, os.path.basename(entry))
                  with zf.open(entry) as src, open(target, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  if (i + 1) % 2000 == 0:
                      print(f"  {i+1}/{len(entries)} ...")
          print(f"Done — {len(entries)} images in {dest_dir}")
          PYEOF
            rm /tmp/CLEVR_v1.0.zip
            echo "Extracted $(ls $TRAIN_IMAGES | wc -l) images to $TRAIN_IMAGES"
          fi

      - name: Download InternVL3_5-1B model
        run: |
          MODEL_DIR="models/InternVL3_5-1B"
          if [ -d "$MODEL_DIR" ] && [ -f "$MODEL_DIR/config.json" ]; then
            echo "Model already cached at $MODEL_DIR"
          else
            echo "Downloading OpenGVLab/InternVL3_5-1B to $MODEL_DIR ..."
            .venv/bin/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='OpenGVLab/InternVL3_5-1B',
              local_dir='models/InternVL3_5-1B',
              ignore_patterns=['*.safetensors.index.json'],
          )
          print('Download complete')
          "
          fi
          echo "MODEL_PATH=$(pwd)/models/InternVL3_5-1B" >> $GITHUB_ENV
          ls -lh "$MODEL_DIR"/ | head -20

      # --- Quality gate: formatting & types (only in debug mode) ---
      - name: Check formatting (black)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true
        run: uv run --no-sync black --check .

      - name: Check imports (isort)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true
        run: uv run --no-sync isort --profile black --check-only .

      - name: Type check (mypy)
        if: env.DEBUG_MODE == 'true'
        continue-on-error: true
        run: |
          set +e
          uv run --no-sync mypy --install-types --non-interactive .

      - name: Set vLLM attention backend for GPU
        run: |
          CC=$(.venv/bin/python -c "import torch; cc=torch.cuda.get_device_capability(); print(cc[0]*10+cc[1])")
          if [ "$CC" -lt 80 ]; then
            echo "Compute capability ${CC} < 80 (pre-Ampere): forcing TRITON_ATTN (FlashInfer requires >= 8.0)"
            echo "VLLM_ATTENTION_BACKEND=TRITON_ATTN" >> $GITHUB_ENV
          else
            echo "Compute capability ${CC} >= 80: using vLLM default attention backend (FlashInfer)"
          fi

      # --- Run GPU tests ---
      - name: Run GPU tests
        run: |
          TEST_LIST=(
            'examples/PMDExistL/pmd_counting_tests'
            'examples/PMDExistL/relation_learning_tests'
            'Clever'
          )
          # Note: ConllQA test is temporarily disabled

          bash .github/scripts/run_tests.sh "test-gpu" "${TEST_LIST[@]}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-gpu
          path: |
            /tmp/test_results_test-gpu.txt
            /tmp/test_failures_test-gpu.txt
          retention-days: 1

  test-vllm:
    runs-on: [self-hosted, linux, x64, gpu]
    needs: [test-gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Resolve & install
        run: |
          uv sync --extra cu128 --extra dev --extra vllm --extra peft

      - name: Set MODEL_PATH if cached
        run: |
          MODEL_DIR="models/InternVL3_5-1B"
          if [ -d "$MODEL_DIR" ] && [ -f "$MODEL_DIR/config.json" ]; then
            echo "Using cached model at $MODEL_DIR"
            echo "MODEL_PATH=$(pwd)/$MODEL_DIR" >> $GITHUB_ENV
          else
            echo "No cached model found — will use HF hub directly"
          fi

      - name: GPU & driver info
        run: |
          echo "=== nvidia-smi ==="
          nvidia-smi
          echo ""
          echo "=== CUDA version ==="
          nvidia-smi --query-gpu=driver_version,compute_cap --format=csv,noheader
          echo ""
          echo "=== GPU memory ==="
          nvidia-smi --query-gpu=name,memory.total,memory.free --format=csv,noheader

      - name: Verify torch CUDA
        run: |
          .venv/bin/python -c "
          import torch
          print(f'PyTorch:        {torch.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          if torch.cuda.is_available():
              print(f'CUDA version:   {torch.version.cuda}')
              print(f'GPU:            {torch.cuda.get_device_name(0)}')
              print(f'GPU memory:     {torch.cuda.get_device_properties(0).total_memory/ 1024**3:.1f} GB')
              # Quick matmul smoke test
              a = torch.randn(1000, 1000, device='cuda')
              b = torch.randn(1000, 1000, device='cuda')
              torch.cuda.synchronize()
              import time
              t0 = time.perf_counter()
              for _ in range(100):
                  c = a @ b
              torch.cuda.synchronize()
              elapsed = time.perf_counter() - t0
              print(f'100x matmul(1k,1k): {elapsed:.3f}s ({100/elapsed:.0f} ops/s)')
          else:
              print('WARNING: CUDA not available!')
              exit(1)
          "

      - name: Verify vLLM import
        run: |
          .venv/bin/python -c "
          import vllm
          print(f'vLLM version: {vllm.__version__}')
          print('vLLM import OK')
          "

      - name: Set vLLM attention backend for GPU
        run: |
          CC=$(.venv/bin/python -c "import torch; cc=torch.cuda.get_device_capability(); print(cc[0]*10+cc[1])")
          if [ "$CC" -lt 80 ]; then
            echo "Compute capability ${CC} < 80 (pre-Ampere): forcing TRITON_ATTN"
            echo "VLLM_ATTENTION_BACKEND=TRITON_ATTN" >> $GITHUB_ENV
          else
            echo "Compute capability ${CC} >= 80: using vLLM default (FlashInfer)"
          fi

      - name: Test vLLM engine initialization
        timeout-minutes: 10
        run: |
          .venv/bin/python -c "
          import torch
          import time

          cc = torch.cuda.get_device_capability()
          print('=== vLLM Engine Initialization Test ===')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          print(f'Compute capability: {cc[0]}.{cc[1]}')
          print(f'GPU memory: {torch.cuda.get_device_properties(0).total_memory / 1024**3:.1f} GB')
          print(f'Free memory: {torch.cuda.mem_get_info()[0] / 1024**3:.1f} GB')
          print()

          from vllm import LLM, SamplingParams

          t0 = time.perf_counter()
          try:
              llm = LLM(
                  model='facebook/opt-125m',
                  gpu_memory_utilization=0.5,
                  max_model_len=256,
                  enforce_eager=True,
              )
              init_time = time.perf_counter() - t0
              print(f'Engine init:    {init_time:.1f}s')

              # Run a simple generation to test end-to-end
              params = SamplingParams(temperature=0.0, max_tokens=20)
              t1 = time.perf_counter()
              outputs = llm.generate(['Hello, world!'], params)
              gen_time = time.perf_counter() - t1
              print(f'Generation:     {gen_time:.2f}s')
              print(f'Output:         {outputs[0].outputs[0].text[:100]}')
              print()
              print('vLLM engine test PASSED')

              # Cleanup
              del llm
              torch.cuda.empty_cache()

          except Exception as e:
              elapsed = time.perf_counter() - t0
              print(f'FAILED after {elapsed:.1f}s: {e}')
              import traceback
              traceback.print_exc()
              exit(1)
          "

      - name: Test InternVL model loading (PEFT)
        timeout-minutes: 15
        continue-on-error: true
        run: |
          .venv/bin/python -c "
          import torch
          import time
          import os

          print('=== InternVL / PEFT Load Test ===')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          print(f'Free memory: {torch.cuda.mem_get_info()[0] / 1024**3:.1f} GB')
          print()

          from transformers import AutoModel, AutoTokenizer

          # Use local model if downloaded by test-gpu, otherwise pull from HF
          model_path = os.environ.get('MODEL_PATH', 'OpenGVLab/InternVL3_5-1B')
          print(f'Loading {model_path} ...')

          t0 = time.perf_counter()
          try:
              tokenizer = AutoTokenizer.from_pretrained(model_path, trust_remote_code=True)
              model = AutoModel.from_pretrained(
                  model_path,
                  torch_dtype=torch.float16,
                  trust_remote_code=True,
              ).cuda()
              load_time = time.perf_counter() - t0
              n_params = sum(p.numel() for p in model.parameters()) / 1e6
              print(f'Load time:      {load_time:.1f}s')
              print(f'Parameters:     {n_params:.0f}M')
              print(f'GPU used:       {torch.cuda.memory_allocated() / 1024**3:.2f} GB')
              print()

              # Test PEFT wrapping
              from peft import LoraConfig, get_peft_model
              lora_config = LoraConfig(
                  r=8, lora_alpha=16,
                  target_modules=['q_proj', 'v_proj'],
                  lora_dropout=0.05,
              )
              peft_model = get_peft_model(model, lora_config)
              trainable = sum(p.numel() for p in peft_model.parameters() if p.requires_grad)
              total = sum(p.numel() for p in peft_model.parameters())
              print(f'LoRA trainable: {trainable/1e6:.1f}M / {total/1e6:.0f}M ({100*trainable/total:.2f}%)')
              print()
              print('InternVL + PEFT test PASSED')

              del peft_model, model
              torch.cuda.empty_cache()

          except Exception as e:
              elapsed = time.perf_counter() - t0
              print(f'FAILED after {elapsed:.1f}s: {e}')
              import traceback
              traceback.print_exc()
              exit(1)
          "

      - name: Upload vLLM test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-vllm
          path: |
            /tmp/test_results_test-vllm.txt
          retention-days: 1

  generate-requirements:
    runs-on: ubuntu-latest
    needs: [test-cpu, test-gpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Generate requirements.txt (CPU)
        run: |
          uv export --extra cpu --no-hashes --no-dev -o requirements.txt

      - name: Generate requirements-dev.txt (CPU)
        run: |
          uv export --extra cpu --extra dev --no-hashes -o requirements-dev.txt

      - name: Generate requirements-cu128.txt (CUDA 12.8)
        run: |
          uv export --extra cu128 --no-hashes --no-dev -o requirements-cu128.txt

      - name: Generate requirements-cu128-dev.txt (CUDA 12.8)
        run: |
          uv export --extra cu128 --extra dev --no-hashes -o requirements-cu128-dev.txt

      - name: Generate requirements-cu126.txt (CUDA 12.6)
        run: |
          uv export --extra cu126 --no-hashes --no-dev -o requirements-cu126.txt

      - name: Generate requirements-cu126-dev.txt (CUDA 12.6)
        run: |
          uv export --extra cu126 --extra dev --no-hashes -o requirements-cu126-dev.txt

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add requirements*.txt
          if git diff --staged --quiet; then
            echo "No changes to requirements files"
          else
            git commit -m "chore: update requirements files [skip ci]"
            git push
          fi

  report:
    runs-on: ubuntu-latest
    needs: [test-cpu, test-gpu, test-vllm]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Download all test results
        uses: actions/download-artifact@v7
        with:
          path: test-results

      - name: Generate combined report
        run: |
          bash .github/scripts/generate_report.sh test-results "${{ env.DEBUG_MODE }}"